// ── Generar PDF carta completa ────────────────────────────────────
function generarPDF(menu){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const PW=210, PH=297;
  const margin=15;
  let y=margin;

  function checkPage(needed=10){
    if(y+needed>PH-margin){doc.addPage();y=margin;}
  }

  // ── Timón SVG dibujado con líneas ──
  function drawTimon(cx,cy,r){
    doc.setDrawColor(180,140,30);
    doc.setLineWidth(0.5);
    // radios
    for(let i=0;i<8;i++){
      const ang=(i*45)*Math.PI/180;
      doc.line(cx+r*0.3*Math.cos(ang),cy+r*0.3*Math.sin(ang),cx+r*0.9*Math.cos(ang),cy+r*0.9*Math.sin(ang));
    }
    // aro exterior
    doc.circle(cx,cy,r);
    // hub
    doc.setFillColor(30,30,30);
    doc.circle(cx,cy,r*0.25,"F");
    doc.setFillColor(180,140,30);
    doc.circle(cx,cy,r*0.12,"F");
  }

  // ── HEADER ──
  // Fondo negro header
  doc.setFillColor(15,22,40);
  doc.rect(0,0,PW,45,"F");

  // Timón
  drawTimon(PW/2,14,7);

  // Nombre
  doc.setTextColor(212,168,67);
  doc.setFont("times","bolditalic");
  doc.setFontSize(28);
  doc.text("El Timón",PW/2,28,{align:"center"});

  // Subtítulo
  doc.setFont("helvetica","normal");
  doc.setFontSize(8);
  doc.setTextColor(160,128,64);
  doc.text("Cocina casera  ·  Parrilla  ·  Pastas  ·  Pescados",PW/2,34,{align:"center"});

  // Tel
  doc.setFontSize(7.5);
  doc.setTextColor(120,100,50);
  doc.text("Tel: 4772-0370 / 4777-2798",PW/2,39,{align:"center"});

  // Línea dorada
  doc.setDrawColor(180,140,30);
  doc.setLineWidth(0.6);
  doc.line(margin,43,PW-margin,43);

  y=50;

  // ── CATEGORÍAS E ÍTEMS ──
  menu.categories.forEach(cat=>{
    if(cat.items.length===0)return;
    checkPage(14);

    // Cabecera categoría
    doc.setFillColor(235,228,210);
    doc.rect(margin,y-5,PW-margin*2,9,"F");
    doc.setDrawColor(180,140,30);
    doc.setLineWidth(0.3);
    doc.rect(margin,y-5,PW-margin*2,9,"S");

    doc.setFont("helvetica","bold");
    doc.setFontSize(10);
    doc.setTextColor(30,20,5);
    doc.text(cat.emoji+" "+cat.name.toUpperCase(),margin+3,y+0.5);
    y+=10;

    // Ítems
    cat.items.forEach((item,idx)=>{
      checkPage(7);
      // fondo alternado
      if(idx%2===0){
        doc.setFillColor(252,250,245);
        doc.rect(margin,y-4,PW-margin*2,6.5,"F");
      }
      // nombre
      doc.setFont("helvetica","normal");
      doc.setFontSize(9);
      doc.setTextColor(40,30,10);
      const maxW=PW-margin*2-35;
      const nameLines=doc.splitTextToSize(item.name,maxW);
      doc.text(nameLines,margin+3,y);
      // puntos
      doc.setTextColor(180,160,120);
      doc.setFont("helvetica","normal");
      // precio
      doc.setFont("helvetica","bold");
      doc.setFontSize(9);
      doc.setTextColor(40,30,10);
      const priceStr="$ "+Number(item.price).toLocaleString("es-AR");
      doc.text(priceStr,PW-margin-2,y,{align:"right"});
      // línea separadora suave
      doc.setDrawColor(220,210,190);
      doc.setLineWidth(0.1);
      doc.line(margin,y+2.5,PW-margin,y+2.5);
      y+=nameLines.length>1?nameLines.length*5+1:6.5;
    });
    y+=4;
  });

  // ── FOOTER en cada página ──
  const totalPages=doc.internal.getNumberOfPages();
  for(let p=1;p<=totalPages;p++){
    doc.setPage(p);
    doc.setDrawColor(180,140,30);
    doc.setLineWidth(0.3);
    doc.line(margin,PH-12,PW-margin,PH-12);
    doc.setFont("helvetica","normal");
    doc.setFontSize(7);
    doc.setTextColor(150,120,60);
    doc.text("timon-menu.vercel.app",margin,PH-7);
    doc.text(`Página ${p} de ${totalPages}`,PW-margin,PH-7,{align:"right"});
    doc.text("Precios en pesos argentinos · IVA incluido",PW/2,PH-7,{align:"center"});
  }

  doc.save("carta-el-timon.pdf");
}

async function dbLoad(){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/menu_items?select=*&order=id`,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
  return r.ok?r.json():null;
}
async function dbSaveAll(categories){
  await fetch(`${SUPABASE_URL}/rest/v1/menu_items?id=neq.NONE`,{method:"DELETE",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json"}});
  const rows=[];
  categories.forEach((cat,catIdx)=>cat.items.forEach((item,itemIdx)=>{
    rows.push({id:item.id,category_id:cat.id,category_name:cat.name,category_emoji:cat.emoji,item_name:item.name,price:item.price,cat_order:catIdx,item_order:itemIdx});
  }));
  if(rows.length===0)return true;
  const r=await fetch(`${SUPABASE_URL}/rest/v1/menu_items`,{method:"POST",headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},body:JSON.stringify(rows)});
  return r.ok||r.status===201;
}
function dbToMenu(rows,base){
  if(!rows||rows.length===0)return null;
  const cats={};
  const catOrder={};
  rows.forEach(r=>{
    if(!cats[r.category_id])cats[r.category_id]={id:r.category_id,name:r.category_name,emoji:r.category_emoji,items:[],_order:r.cat_order||0};
    cats[r.category_id].items.push({id:r.id,name:r.item_name,price:r.price,_order:r.item_order||0});
  });
  Object.values(cats).forEach(c=>c.items.sort((a,b)=>a._order-b._order));
  const sorted=Object.values(cats).sort((a,b)=>a._order-b._order);
  // add empty cats from base that have no items in db
  const dbIds=new Set(sorted.map(c=>c.id));
  base.categories.forEach(bc=>{if(!dbIds.has(bc.id)&&bc.items.length===0)sorted.push({...bc});});
  return{...base,categories:sorted};
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(p){return"$ "+Number(p).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0,useGrouping:true});}
function applyPct(p,pct){return Math.round(p*(1+pct/100));}

function TimonSVG({size=60}){
  return(<svg width={size} height={size} viewBox="0 0 100 100" fill="none">
    {[0,45,90,135,180,225,270,315].map((ang,i)=>{
      const r=ang*Math.PI/180,x1=50+14*Math.cos(r),y1=50+14*Math.sin(r),x2=50+39*Math.cos(r),y2=50+39*Math.sin(r),hx=50+45*Math.cos(r),hy=50+45*Math.sin(r);
      return(<g key={i}><line x1={x1} y1={y1} x2={x2} y2={y2} stroke="#c8962a" strokeWidth="4" strokeLinecap="round"/><ellipse cx={hx} cy={hy} rx="5" ry="7.5" transform={`rotate(${ang} ${hx} ${hy})`} fill="#7a4f10" stroke="#c8962a" strokeWidth="1.5"/></g>);
    })}
    <circle cx="50" cy="50" r="40" stroke="#c8962a" strokeWidth="5" fill="none"/>
    <circle cx="50" cy="50" r="14" fill="#0a1628" stroke="#c8962a" strokeWidth="4"/>

  </svg>);
}

          <label style={{display:"block",marginBottom:7,fontSize:13,color:"#a08040"}}>Aplicar a:</label>
          <div style={{display:"flex",gap:7}}>
            {["category","all"].map(m=>(<button key={m} onClick={()=>setBulkMode(m)} style={{flex:1,padding:"9px",cursor:"pointer",borderRadius:8,fontWeight:600,fontSize:12,background:bulkMode===m?"rgba(180,140,30,0.3)":"rgba(255,255,255,0.06)",border:bulkMode===m?"1px solid #b8891e":"1px solid rgba(180,145,60,0.2)",color:bulkMode===m?"#d4a843":"#6a6040"}}>{m==="category"?"Una categoría":"Todo el menú"}</button>))}
          </div>
        </div>
        {bulkMode==="category"&&<div style={{marginBottom:12}}>
          <label style={{display:"block",marginBottom:6,fontSize:13,color:"#a08040"}}>Categoría:</label>
          <select value={bulkCatId} onChange={e=>setBulkCatId(e.target.value)} style={{...iStyle,width:"100%",cursor:"pointer"}}>
            {menu.categories.map(c=><option key={c.id} value={c.id} style={{background:"#0d1a30"}}>{c.emoji} {c.name}</option>)}
          </select>
        </div>}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",marginBottom:6,fontSize:13,color:"#a08040"}}>Porcentaje (negativo = baja):</label>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <input type="number" placeholder="Ej: 20 o -15" value={bulkPct} onChange={e=>setBulkPct(e.target.value)} style={{...iStyle,flex:1,fontSize:22,textAlign:"center",color:"#d4a843",fontFamily:"Arial,sans-serif"}}/>
            <span style={{fontSize:22,color:"#6a6040"}}>%</span>
          </div>
        </div>
        {bulkPct&&!isNaN(parseFloat(bulkPct))&&<div style={{background:"rgba(180,140,30,0.08)",border:"1px solid rgba(180,140,30,0.2)",borderRadius:9,padding:"9px 12px",marginBottom:12,fontSize:12,color:"#a08040"}}>
          💡 <strong>{bulkMode==="all"?"Todo el menú":menu.categories.find(c=>c.id===bulkCatId)?.name}</strong> {parseFloat(bulkPct)>0?"subirá":"bajará"} un <strong>{Math.abs(parseFloat(bulkPct))}%</strong>
        </div>}
        <button onClick={applyBulk} style={{width:"100%",background:"linear-gradient(135deg,#b8891e,#d4a843)",border:"none",borderRadius:9,padding:"13px",fontWeight:700,fontSize:14,color:"#0a1628",cursor:"pointer"}}>Aplicar ajuste</button>
      </div>}

      {tab==="cats"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(180,145,60,0.2)",borderRadius:12,padding:16}}>
          <h3 style={{color:"#d4a843",marginTop:0,marginBottom:14}}>Orden de categorías</h3>
          <p style={{fontSize:11,color:"#6a6040",marginBottom:8}}>💡 Arrastrá para reordenar, o usá las flechas ▲▼</p>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {menu.categories.map((cat,idx)=>(
              <div key={cat.id}
                draggable
                onDragStart={e=>e.dataTransfer.setData("catIdx",String(idx))}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{e.preventDefault();const from=parseInt(e.dataTransfer.getData("catIdx"));if(from===idx)return;setMenu(m=>{const cats=[...m.categories];const[moved]=cats.splice(from,1);cats.splice(idx,0,moved);return{...m,categories:cats};});}}
                style={{display:"flex",alignItems:"center",gap:8,background:"rgba(255,255,255,0.04)",borderRadius:9,padding:"9px 12px",border:"1px solid rgba(180,145,60,0.1)",cursor:"grab",transition:"all 0.15s"}}>
                <span style={{color:"#6a6040",fontSize:16,cursor:"grab",userSelect:"none"}}>⠿</span>
                <span style={{fontSize:18}}>{cat.emoji}</span>
                <span style={{flex:1,fontSize:13,color:"#c8c0a0"}}>{cat.name} <span style={{color:"#404860",fontSize:11}}>({cat.items.length})</span></span>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={e=>{e.stopPropagation();moveUp(idx);}} disabled={idx===0} style={{background:"rgba(180,140,30,0.15)",border:"1px solid rgba(180,140,30,0.3)",borderRadius:6,color:idx===0?"#404040":"#d4a843",cursor:idx===0?"default":"pointer",width:26,height:26,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>▲</button>
                  <button onClick={e=>{e.stopPropagation();moveDown(idx);}} disabled={idx===menu.categories.length-1} style={{background:"rgba(180,140,30,0.15)",border:"1px solid rgba(180,140,30,0.3)",borderRadius:6,color:idx===menu.categories.length-1?"#404040":"#d4a843",cursor:idx===menu.categories.length-1?"default":"pointer",width:26,height:26,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>▼</button>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(180,145,60,0.2)",borderRadius:12,padding:16}}>
          <h3 style={{color:"#d4a843",marginTop:0,marginBottom:14}}>Agregar nueva categoría</h3>
          <div style={{marginBottom:10}}>
            <label style={{display:"block",marginBottom:5,fontSize:13,color:"#a08040"}}>Emoji:</label>
            <input type="text" value={newCatEmoji} onChange={e=>setNewCatEmoji(e.target.value)} style={{...iStyle,width:60,textAlign:"center",fontSize:22}} maxLength={2}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",marginBottom:5,fontSize:13,color:"#a08040"}}>Nombre:</label>
            <input type="text" placeholder="Ej: Pastas especiales" value={newCatName} onChange={e=>setNewCatName(e.target.value)} style={{...iStyle,width:"100%"}}/>
          </div>
          <button onClick={addCategory} style={{width:"100%",background:"linear-gradient(135deg,#b8891e,#d4a843)",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:14,color:"#0a1628",cursor:"pointer"}}>+ Crear categoría</button>
        </div>
      </div>}

      {tab==="info"&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(180,145,60,0.2)",borderRadius:12,padding:18}}>
        <h3 style={{color:"#d4a843",marginTop:0,marginBottom:14}}>Datos del restaurante</h3>
        {[["Nombre","name"],["Subtítulo","subtitle"],["Dirección / Teléfono","address"]].map(([lbl,key])=>(<div key={key} style={{marginBottom:12}}>
          <label style={{display:"block",marginBottom:5,fontSize:13,color:"#a08040"}}>{lbl}</label>
          <input type="text" value={editR[key]||""} onChange={e=>setEditR(r=>({...r,[key]:e.target.value}))} style={{...iStyle,width:"100%"}}/>
        </div>))}
        <button onClick={()=>{setMenu(m=>({...m,restaurant:{...m.restaurant,...editR}}));showMsg("✅ Datos actualizados. Tocá Guardar.");}} style={{width:"100%",background:"linear-gradient(135deg,#b8891e,#d4a843)",border:"none",borderRadius:9,padding:"12px",fontWeight:700,fontSize:14,color:"#0a1628",cursor:"pointer"}}>Aplicar</button>
      </div>}

      {tab==="qr"&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(180,145,60,0.2)",borderRadius:12,padding:22,textAlign:"center"}}>
        <h3 style={{color:"#d4a843",marginTop:0,marginBottom:8}}>Código QR del menú</h3>
        <p style={{color:"#6a6040",fontSize:13,marginBottom:18}}>Escanealo con cualquier celular para ver el menú.</p>
        <div style={{display:"inline-block",background:"#fff8f0",padding:16,borderRadius:13,border:"3px solid rgba(180,140,30,0.4)",marginBottom:16}}>
          <img src={"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(SITE_URL)+"&bgcolor=fff8f0&color=0a1628&margin=8"} alt="QR" style={{width:200,height:200,borderRadius:10,display:"block"}} onError={e=>{e.target.style.display="none";}}/>
          <div style={{marginTop:8,color:"#1a0800",fontSize:13,fontWeight:700}}>El Timón</div>
          <div style={{color:"#6a4010",fontSize:11}}>📷 Escaneá para ver el menú</div>
        </div>
        <div style={{background:"rgba(180,140,30,0.08)",border:"1px solid rgba(180,140,30,0.2)",borderRadius:9,padding:"12px 14px",fontSize:13,color:"#a08040"}}>
          <strong>URL del menú:</strong><br/>
          <code style={{color:"#d4a843",fontSize:12}}>{SITE_URL}</code>
        </div>
      </div>}

      {tab==="pdf"&&<div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(180,145,60,0.2)",borderRadius:12,padding:22,textAlign:"center"}}>
        <h3 style={{color:"#d4a843",marginTop:0,marginBottom:8}}>Descargar carta completa</h3>
        <p style={{color:"#6a6040",fontSize:13,marginBottom:20}}>Genera un PDF con todos los ítems y precios, listo para imprimir en A4.</p>
        <button onClick={()=>generarPDF(menu)} style={{background:"linear-gradient(135deg,#b8891e,#d4a843)",border:"none",borderRadius:10,padding:"14px 28px",fontWeight:700,fontSize:15,color:"#0a1628",cursor:"pointer",marginBottom:16}}>
          📄 Descargar PDF
        </button>
        <div style={{background:"rgba(180,140,30,0.08)",border:"1px solid rgba(180,140,30,0.2)",borderRadius:9,padding:"12px 14px",fontSize:12,color:"#a08040",textAlign:"left"}}>
          💡 El PDF incluye todas las categorías con sus ítems y precios actuales. Podés imprimirlo en hojas A4.
        </div>
      </div>}
    </div>
  </div>);
}

function App(){
  const [menu,setMenu]=useState(MENU_INICIAL);
  const [view,setView]=useState("customer");
  const [showLogin,setShowLogin]=useState(false);
  const [pin,setPin]=useState("");
  const [pinErr,setPinErr]=useState(false);
  const [loading,setLoading]=useState(true);
  const PIN="1234";
  window._showLogin=()=>setShowLogin(true);

  useEffect(()=>{
    dbLoad().then(rows=>{
      if(rows&&rows.length>0){const m=dbToMenu(rows,MENU_INICIAL);if(m)setMenu(m);}
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  function tryLogin(){
    if(pin===PIN){setView("admin");setShowLogin(false);setPin("");setPinErr(false);}
    else{setPinErr(true);setTimeout(()=>setPinErr(false),1500);}
  }

  if(loading)return(<div style={{minHeight:"100vh",background:"#0a1628",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}}>
    <TimonSVG size={70}/><div style={{color:"#d4a843",fontSize:16,fontFamily:"'Palatino Linotype',serif",letterSpacing:2}}>Cargando menú...</div>
  </div>);

  if(view==="admin")return<AdminPanel menu={menu} setMenu={setMenu} onExit={()=>setView("customer")}/>;
  return(<div style={{position:"relative"}}>
    <CustomerView menu={menu}/>
    {showLogin&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,backdropFilter:"blur(8px)"}}>
      <div style={{background:"linear-gradient(160deg,#050e1a,#0d1a30)",border:"1px solid rgba(180,145,60,0.4)",borderRadius:18,padding:28,width:"min(300px,90vw)",textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><TimonSVG size={48}/></div>
        <h3 style={{color:"#d4a843",margin:"0 0 4px"}}>Administración</h3>
        <p style={{color:"#6a6040",fontSize:13,margin:"0 0 14px"}}>Ingresá el PIN</p>
        <input type="password" placeholder="PIN" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} style={{width:"100%",background:pinErr?"rgba(200,50,50,0.15)":"rgba(255,255,255,0.07)",border:pinErr?"1px solid rgba(200,80,80,0.6)":"1px solid rgba(180,145,60,0.3)",borderRadius:9,color:"#e8d5b0",padding:"11px 14px",fontSize:22,textAlign:"center",letterSpacing:8,boxSizing:"border-box",outline:"none",marginBottom:4,fontFamily:"Arial,sans-serif"}}/>
        {pinErr&&<div style={{color:"#ff6060",fontSize:12,marginBottom:5}}>PIN incorrecto</div>}
        <div style={{display:"flex",gap:7,marginTop:10}}>
          <button onClick={()=>{setShowLogin(false);setPin("");}} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(180,145,60,0.2)",color:"#6a6040",padding:"10px",borderRadius:8,cursor:"pointer",fontSize:13}}>Cancelar</button>
          <button onClick={tryLogin} style={{flex:1,background:"linear-gradient(135deg,#b8891e,#d4a843)",border:"none",color:"#0a1628",padding:"10px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700}}>Entrar</button>
        </div>
      </div>
    </div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
